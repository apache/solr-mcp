spring.main.web-application-type=servlet
spring.ai.mcp.server.type=sync
spring.ai.mcp.server.protocol=stateless
spring.ai.mcp.server.stdio=false
# Docker Compose integration: automatically start Solr and other services on bootRun.
# Spring Boot detects compose.yaml and starts declared services before the application context.
spring.docker.compose.enabled=true
# OAuth2 Security Configuration
# Configure the issuer URI for your OAuth2 authorization server
# For Auth0: https://<your-auth0-domain>/.well-known/openid-configuration
# For Keycloak: https://<keycloak-host>/realms/<realm-name>
# For Okta: https://<your-okta-domain>/oauth2/default/.well-known/openid-configuration
#
# Audience validation: when http.security.enabled=true, the MCP server enforces
# that incoming JWTs carry an "aud" claim matching its canonical resource URI
# (per RFC 8707 / the MCP Authorization specification).  The IdP must be
# configured to populate "aud" accordingly:
#   * Auth0   - pass `audience=<MCP server URL>` on the auth request; Auth0
#               reflects it into "aud" automatically.
#   * Okta    - configure the audience on the Authorization Server.
#   * Keycloak - add an "Audience" protocol mapper on a client scope and set
#               `Included Custom Audience` to the MCP server URL (Keycloak does
#               not yet honor RFC 8707 `resource=` natively, see
#               docs/security/http.md).
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:https://your-auth0-domain.auth0.com/}
# Security toggle - HTTP mode is secured by default. Set HTTP_SECURITY_ENABLED=false
# to bypass OAuth2 authentication for local development only. Disabling security
# in any environment reachable from the network is unsafe; the MCP Authorization
# specification requires HTTP-based MCP servers to authenticate.
http.security.enabled=${HTTP_SECURITY_ENABLED:true}
# Comma-separated list of allowed CORS origins for the MCP HTTP endpoint.
# Defaults to MCP Inspector's local proxy. Add additional origins (browser-based
# MCP clients, internal dashboards) as needed. Do NOT use "*" with credentials.
mcp.cors.allowed-origins=${MCP_CORS_ALLOWED_ORIGINS:http://localhost:6274,http://127.0.0.1:6274}
# observability
management.endpoints.web.exposure.include=health,sbom,metrics,info,loggers,prometheus
# Enable @Observed annotation support for custom spans
management.observations.annotations.enabled=true
# Tracing Configuration
# Set to 1.0 for 100% sampling in development, lower in production (e.g., 0.1)
management.tracing.sampling.probability=${OTEL_SAMPLING_PROBABILITY:1.0}
otel.exporter.otlp.endpoint=${OTEL_TRACES_URL:http://localhost:4317}
otel.exporter.otlp.protocol=grpc
